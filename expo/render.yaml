services:
  - type: web
    name: easy-seas-backend
    env: node
    buildCommand: bun install
    startCommand: bun run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: ./data
      - key: PORT
        value: 10000
      - key: EXPO_PUBLIC_TOOLKIT_URL
        sync: false
      - key: EXPO_PUBLIC_RORK_DB_ENDPOINT
        sync: false
      - key: EXPO_PUBLIC_RORK_DB_NAMESPACE
        sync: false
      - key: EXPO_PUBLIC_RORK_DB_TOKEN
        sync: false
